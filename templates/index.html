<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetStuff Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: #16213e;
            border-bottom: 1px solid #0f3460;
        }

        .header-text {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        header h1 {
            font-size: 18px;
            font-weight: 600;
            color: #e94560;
        }

        .header-subtitle {
            font-size: 11px;
            color: #7a8ba6;
            font-weight: 400;
        }

        #new-chat-btn {
            padding: 6px 14px;
            background: transparent;
            color: #e94560;
            border: 1px solid #e94560;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s, color 0.2s;
        }

        #new-chat-btn:hover {
            background: #e94560;
            color: #fff;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 720px;
            width: fit-content;
            padding: 10px 16px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 15px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .message.user {
            align-self: flex-end;
            background: #0f3460;
            color: #e0e0e0;
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            align-self: flex-start;
            background: #16213e;
            color: #e0e0e0;
            border-bottom-left-radius: 4px;
        }

        .tool-status {
            align-self: flex-start;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 13px;
            color: #4fc3f7;
            background: #0d1b2a;
            border: 1px solid #1a3a5c;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tool-status .spinner {
            width: 14px;
            height: 14px;
            border: 2px solid #4fc3f7;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #input-area {
            display: flex;
            gap: 10px;
            padding: 16px 20px;
            background: #16213e;
            border-top: 1px solid #0f3460;
        }

        #message-input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #0f3460;
            border-radius: 8px;
            background: #1a1a2e;
            color: #e0e0e0;
            font-size: 15px;
            font-family: inherit;
            outline: none;
            resize: none;
            min-height: 44px;
            max-height: 120px;
        }

        #message-input:focus {
            border-color: #e94560;
        }

        #send-btn {
            padding: 10px 20px;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: background 0.2s;
        }

        #send-btn:hover {
            background: #c73650;
        }

        #send-btn:disabled {
            background: #533;
            cursor: not-allowed;
        }

        .empty-state {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            font-size: 16px;
        }

        .token-usage {
            align-self: flex-start;
            font-size: 11px;
            color: #4a5568;
            padding: 2px 8px;
            margin-top: -8px;
        }

        #token-counter {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 2px;
            font-size: 11px;
            color: #7a8ba6;
            white-space: nowrap;
        }

        #token-counter .token-total {
            color: #4fc3f7;
            font-weight: 600;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-text">
            <h1>NetStuff Chat</h1>
            <span class="header-subtitle">Interact with your Network Resources using Natural Language! Current resources are NetBox, Meraki, and CML</span>
        </div>
        <div id="token-counter" title="Session token usage">
            <span class="token-total">0 tokens</span>
            <span id="token-detail">in: 0 &nbsp;out: 0</span>
        </div>
        <button id="new-chat-btn">New Chat</button>
    </header>

    <div id="chat-container">
        <div class="empty-state" id="empty-state">Send a message to start chatting</div>
    </div>

    <div id="input-area">
        <textarea id="message-input" placeholder="Type a message..." rows="1"></textarea>
        <button id="send-btn">Send</button>
    </div>

    <script>
        const chatContainer = document.getElementById("chat-container");
        const messageInput = document.getElementById("message-input");
        const sendBtn = document.getElementById("send-btn");
        const newChatBtn = document.getElementById("new-chat-btn");
        const emptyState = document.getElementById("empty-state");

        let history = [];
        let sending = false;
        let sessionInputTokens = 0;
        let sessionOutputTokens = 0;

        function updateTokenCounter(inputDelta, outputDelta) {
            sessionInputTokens += inputDelta;
            sessionOutputTokens += outputDelta;
            const total = sessionInputTokens + sessionOutputTokens;
            document.querySelector("#token-counter .token-total").textContent =
                total.toLocaleString() + " tokens";
            document.getElementById("token-detail").innerHTML =
                `in: ${sessionInputTokens.toLocaleString()} &nbsp;out: ${sessionOutputTokens.toLocaleString()}`;
        }

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function addMessage(role, content) {
            if (emptyState) emptyState.remove();
            const div = document.createElement("div");
            div.className = `message ${role}`;
            div.textContent = content;
            chatContainer.appendChild(div);
            scrollToBottom();
            return div;
        }

        function addToolStatus(content) {
            if (emptyState) emptyState.remove();
            const div = document.createElement("div");
            div.className = "tool-status";
            div.innerHTML = `<span class="spinner"></span><span>${content}</span>`;
            chatContainer.appendChild(div);
            scrollToBottom();
            return div;
        }

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || sending) return;

            sending = true;
            sendBtn.disabled = true;
            messageInput.value = "";
            messageInput.style.height = "auto";

            addMessage("user", text);
            let assistantDiv = null;
            let statusDiv = null;

            try {
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: text, history: history }),
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullResponse = "";
                let buffer = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split("\n");
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (!line.startsWith("data: ")) continue;
                        const payload = line.slice(6);

                        if (payload === "[DONE]") continue;

                        try {
                            const data = JSON.parse(payload);
                            if (data.error) {
                                if (!assistantDiv) assistantDiv = addMessage("assistant", "");
                                assistantDiv.textContent = `Error: ${data.error}`;
                                break;
                            }
                            if (data.type === "usage") {
                                updateTokenCounter(data.input, data.output);
                            } else if (data.type === "clear") {
                                // Server detected a raw JSON tool call — clear it
                                fullResponse = "";
                                if (assistantDiv) {
                                    assistantDiv.remove();
                                    assistantDiv = null;
                                }
                            } else if (data.type === "status") {
                                // Remove previous status indicator if any
                                if (statusDiv) statusDiv.remove();
                                statusDiv = addToolStatus(data.content);
                            } else if (data.type === "token") {
                                // Remove status indicator once tokens start flowing
                                if (statusDiv) {
                                    statusDiv.remove();
                                    statusDiv = null;
                                }
                                if (!assistantDiv) assistantDiv = addMessage("assistant", "");
                                fullResponse += data.token;
                                assistantDiv.textContent = fullResponse;
                                scrollToBottom();
                            } else if (data.token) {
                                // Backwards-compatible: handle plain {token} payloads
                                if (!assistantDiv) assistantDiv = addMessage("assistant", "");
                                fullResponse += data.token;
                                assistantDiv.textContent = fullResponse;
                                scrollToBottom();
                            }
                        } catch (e) {
                            // skip malformed JSON
                        }
                    }
                }

                // Clean up any leftover status indicator
                if (statusDiv) statusDiv.remove();

                if (fullResponse) {
                    history.push({ role: "user", content: text });
                    history.push({ role: "assistant", content: fullResponse });
                }
            } catch (err) {
                if (!assistantDiv) assistantDiv = addMessage("assistant", "");
                assistantDiv.textContent = `Connection error: ${err.message}`;
            }

            sending = false;
            sendBtn.disabled = false;
            messageInput.focus();
        }

        sendBtn.addEventListener("click", sendMessage);

        messageInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        messageInput.addEventListener("input", () => {
            messageInput.style.height = "auto";
            messageInput.style.height = messageInput.scrollHeight + "px";
        });

        newChatBtn.addEventListener("click", () => {
            history = [];
            sessionInputTokens = 0;
            sessionOutputTokens = 0;
            updateTokenCounter(0, 0);
            chatContainer.innerHTML = '<div class="empty-state" id="empty-state">Send a message to start chatting</div>';
            messageInput.focus();
        });

        messageInput.focus();
    </script>
</body>
</html>
